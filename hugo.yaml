# If your site is in 'https', then make sure your base url isn't written using 'http' otherwise your sitemap would
# contain http (as opposeed to https) URLs. This would affect Google indexing of your URLs.
baseURL: "https://maobushi.github.io/"
publishDir: "docs"
title: Masayasu Obushi
#copyright: "© [PaperMod Contributors](https://github.com/adityatelange/hugo-PaperMod/graphs/contributors)"
pagination:
  pagerSize: 5
theme: [PaperMod]

enableInlineShortcodes: true
enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false
enableEmoji: true
pygmentsUseClasses: true
mainsections: ["posts", "papermod"]

minify:
  disableXML: true
  # minifyOutput: true

languages:
  en:
    languageName: "English"
    weight: 1
    taxonomies:
      category: categories
      tag: tags
      series: series
    menu:
      main:
        - name: Resume
          url: resume
          weight: 5

        - name: Projects
          url: projects
          weight: 10
        - name: Contact
          url: contact
          weight: 10
  ja:
    languageName: "日本語"
    weight: 2
    taxonomies:
      category: categories
      tag: tags
      series: series
    menu:
      main:
        - name: 履歴書
          url: resume
          weight: 5
        - name: プロジェクト
          url: projects
          weight: 10
        - name: お問い合わせ
          url: contact
          weight: 10
outputs:
  home:
    - HTML
    - RSS
    - JSON

params:
  env: production # to enable google analytics, opengraph, twitter-cards and schema.
  description: "Masayasu Obushi — Full-stack engineer specializing in prediction markets, AI/LLM, and blockchain protocol development."
  author: maobushi
  # author: ["Me", "You"] # multiple authors

  defaultTheme: auto
  # disableThemeToggle: true
  ShowShareButtons: false
  ShowReadingTime: false
  # disableSpecial1stPost: true
  displayFullLangName: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: false
  ShowCodeCopyButtons: true
  ShowRssButtonInSectionTermList: true
  ShowAllPagesInArchive: true
  ShowPageNums: true
  ShowToc: true
  # comments: false
  images: ["images/papermod-cover.png"]

  profileMode:
    enabled: false
    title: "Masayasu Obushi"
    subtitle: "Prediction Markets × AI/LLM × Blockchain"
    # imageUrl: "#"
    # imageTitle: my image
    # imageWidth: 120
    # imageHeight: 120
    buttons:
      - name: Resume
        url: resume
      - name: Projects
        url: projects

  homeInfoParams:
    Title: "👋 Welcome to my Homepage!"
    Content: >
      Full-stack engineer specializing in prediction markets and blockchain protocol development. Building at the intersection of AI/LLM and DeFi. 11+ prizes at international hackathons including ETH Global, Consensus, and Polymarket Builders Program.

  social:
    github: "https://github.com/maobushi"
    twitter: "https://x.com/maobushi"
    buymeacoffee: "https://www.buymeacoffee.com/maobushi"

  socialIcons:
    - name: github
      title: View Source on Github
      url: "https://github.com/maobushi"
    - name: X
      title: Share maobushi on X/Twitter
      url: "https://x.com/maobushi"
    - name: buymeacoffee
      title: Buy me a coffee :)
      url: "https://www.buymeacoffee.com/maobushi"

  # editPost:
  #   URL: "https://github.com/maobushi/maobushi.github.io/tree/main/content"
  #   Text: "Suggest Changes"
  #   appendFilePath: false

  assets:
    disableHLJS: true
  #     favicon: "<link / abs url>"
  #     favicon16x16: "<link / abs url>"
  #     favicon32x32: "<link / abs url>"
  #     apple_touch_icon: "<link / abs url>"
  #     safari_pinned_tab: "<link / abs url>"

  # cover:
  #     hidden: true # hide everywhere but not in structured data
  #     hiddenInList: true # hide on list pages and home
  #     hiddenInSingle: true # hide on single page

  # fuseOpts:
  #     isCaseSensitive: false
  #     shouldSort: true
  #     location: 0
  #     distance: 1000
  #     threshold: 0.4
  #     minMatchCharLength: 0
  #     keys: ["title", "permalink", "summary", "content"]

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false
    # anchorLineNos: true
    # codeFences: true
    # guessSyntax: true
    # lineNos: true
    # style: monokai

